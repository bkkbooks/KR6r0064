body:
  text: 宋瑪瑙元敬東嘉元復仝述明雲棲袾宏重梓晉三藏理法師師名慧理西竺人也東晉咸和初來遊此土至杭見山巖秀麗曰吾國中天竺靈鷲山之一小朵不知何年飛來佛在世時多為仙靈所隱今此亦復爾耶洞舊有黑白二猿遂呼之應聲而出人始之信飛來峯由是得名師即地建兩剎先靈鷲後靈隱常宴坐巖中因號理公巖今瘞塔在焉贊曰一峯飛來自西而東師亦戾止爰指其蹤呼猿洞冷宴坐巖空花開花落幾度春風齊玉泉超法師師名曇超姓張氏清河人也身長八尺蔬食布衣獨宿山林虎兕不傷建元末棲錢塘靈苑山夏常講經有一老人來聽詰其姓氏曰我非人乃龍也居富春鹿山之下鄉民鑿山侵龍居龍忿不雨今累月矣屈師一往誨化羣龍師允其請且曰吾此地亦無水汝能致之乎老人即撫掌泉自涌出今玉泉是也師乃往彼結壇為龍受戒浮舟講經雨大霑洽嘉定三年賜號靈悟大師贊曰身世兩忘以道自勝靈苑談經有龍來聽求泉泉生求雨雨應龍何為哉惟師是令隋下竺觀法師師名真觀字聖達錢塘范氏世本顯仕師生有奇相舌紫羅紋手左右掌為仙人字出家通經律論時彥曰錢塘有真觀佛法當天下一半尋謁天台智者請受禪觀智者以師齊年止為法兄弟開皇十五年於靈隱山頭陀石室宴坐眾於南去建南天竺寺請師居焉是為開山始祖常講法華以為心要感皋亭神請講捨祠宇為佛殿每盥洗餘滴地不為濡人尤異之師有雅操文帝三徵秦王兩延皆以疾辭大業中因山行自標葬地未幾示寂夢與智者同輩翼佛還山覺而歎曰吾六十二應終以講法華力延一紀今七十四生期畢矣中夜入寂塔在東岡久廢不治天禧中慈雲重修贊曰一乘妙法闡自台祖年齊道同宜襲其武徵命頻繁弗移砥柱清風凜然可激千古中竺千歲和尚師名寶掌中印土人魏晉間東遊自云六百七十三歲周威烈王十二年丁卯生左手握拳有珠在掌中因以為名始抵峨嵋五臺南返衡廬入建鄴與達磨遇於梁朝遂扣法焉洎來二浙愛天竺之勝結茅而居者四十五年復往四明天台及諸名山遊歷將徧唐貞觀十五年還竺峯久之移居浦江寶巖顯慶二年正旦手揑一像九日而成與其貌無異即告徒曰吾誓住世千歲自來支那忽四百歲今已過七十有二年矣說偈而化世稱千歲和尚遺記滅後有僧來取吾骨勿拒越五十四年刺浮長老至彼作禮塔戶倏開得其骨皆連鎖金色因持來別建塔藏之為中竺開山始祖贊曰人壽幾何朝露逝川生周涉唐本誓則然東遲達磨心印始傳孰云佛法獨在西天唐徑山國一欽禪師師名道欽吳郡崑山人姓朱氏世服儒業年二十八即貢於禮部道由丹徒遇鶴林玄素禪師得指入道之要遂出家大悟宗旨久之辭去素曰汝乘流而行遇徑即止師至臨安東北山下問途於樵者曰此徑山也師自東北而登涉重岡西至高峯北巖中據石牀而坐俄有老人素衣拜於前曰我龍也自師至此吾屬五百皆不安居當挈歸天目願以此地為立錫之所言訖不見北峯之陽有草菴可居蓋龍所造也大歷三年代宗詔至闕下禮遇有加一日在內廷帝至起立帝曰師何以起師曰檀越何得向四威儀中見貧道帝悅賜號國一逾年辭歸杭州即其菴所建寺是為開山始祖示寂後諡號大覺贊曰代有覺士出於文儒宴坐雙徑龍驤厥居珠淵鱗屋化為精廬國之一號帝賜不誣唐大慈山中禪師師名寰中姓盧氏蒲坂人也生有異相其聲如鐘出家於并州童子寺受心印於百丈海禪師結茅於南嶽一日南泉至問如何是菴中主師云蒼天蒼天泉云蒼天且置如何是菴中主師云會即便會莫忉忉泉拂袖而出趙州問般若以何為體師云般若以何為體趙州大笑而出師明日見趙州掃地師問般若以何為體趙州置附掌大笑師便歸方丈師後住浙江大慈山上堂示眾云山僧不解答語只能識病又云說得一丈不如行取一尺說得一尺不如行取一寸時學者甚眾山素缺水師擬飛錫夜夢神人告曰勿他之我移南嶽小童子泉就師取用詰旦見二虎以爪跑於地泉自涌出味甘如飴有僧自南嶽至乃曰小童子泉涸矣故東坡題詩云亭亭石塔東峯上此老初來百神仰虎移泉眼趁行脚龍作浪花供撫掌至今遊人灌濯罷臥聽空階環珮響故知此老如此泉莫作人間去來想咸通三年三月十五日無疾而逝壽八十三臘五十四僖宗諡性空大師定慧之塔贊曰履踐真實心悟無際南泉趙州激揚酬對居乏寒泉虎跑以濟惟德斯彰風清日麗唐下竺標法師師名道標富陽秦氏七歲神氣清茂有沙門過而識之勸令出家至德二年詔通佛經七百紙者命為比丘師首中其選得度居南天竺寺護戒甚嚴永泰中住持奏賜寺額居十二年其徒多歸之常於靈鷲峯之南西嶺下葺茅為堂號西嶺草堂怡然養浩不干人事尤工詩章搜鍊精巧與吳興皎然會稽靈徹鼎立齊聲時人有洞冰雪摩雲霄之譽稱西嶺和尚一時名公如李益白居易陸羽之流皆敬之長慶三年示寂葬於山中贊曰出塵異相挺見垂髫業真空法怡然養高適意吟詠配雅與騷名標當世可摩雲霄唐圓澤和尚師名圓澤居慧林與洛京守李源為友約往蜀峨嵋禮普賢大士師欲行斜谷道源欲泝峽師不可源強之乃行舟次南浦見婦人錦襠負汲水師見而泣曰吾始不欲行此道者為是也彼孕我已三年今見之不可逃矣三日浴兒時願公臨門我以一笑為信十二年後錢塘天竺寺外當與公相見言訖而化婦既乳兒源往視之果笑尋即回舟如期至天竺當中秋月下聞葛洪井畔有牧兒扣角而歌曰三生石上舊精魂賞月吟風不用論慚愧情人遠相訪此身雖異性常存源知是師乃趨前曰澤公健否兒曰李公真信士也我與君殊途切勿相近唯以勤修勉之又歌曰身前身後事茫茫欲話因緣恐斷腸吳越江山尋已徧却回煙棹上瞿唐遂去莫知所之贊曰京洛有約峨嵋是行機先一語洞達三生汲事異扣角詩清永懷陳跡山空月明唐韜光禪師師號韜光莫詳族里穆宗時結茅於靈隱西峯巢构塢與鳥窠林公為友刺史白居易重其道嘗具饌飯之以詩邀云白屋炊香飯葷羶不入家濾泉澄葛粉洗手摘藤花青芥除黃葉紅薑帶紫芽命師來伴喫齋罷一甌茶師答云山僧野性好林泉每向巖阿枕石眠不解栽松陪玉勒惟能引水種金蓮白雲乍可來青嶂明月難教下碧天城市不堪飛錫到恐驚鶯囀畫樓前其高致如此菴以師號得名宋丞相陳公堯佐留題菴中賡唱者甚眾紹興中宗正少卿馮檝作修菴記贊曰道藏於身所存異轍或入市或居深樾翳翳巢构牧守折節豈曰韜光若揭日月唐鳥窠林禪師師名道林富陽潘氏母夢日光入口有娠誕時異香滿室遂名香光幼出家詣長安西明學華嚴代宗詔國一禪師至闕師謁之得法南歸抵西湖秦望山有大松樹盤屈如葢乃止其上時人因以鳥窠名之復有鵲巢其側自然馴狎元和中刺史白居易入山訪之問曰師之住處何其危險耶師曰太守危險尤甚曰余忝郡守何險之有師曰薪火相交識性不停得非險乎公悅以偈問曰特入空門問苦空敢將禪事叩禪翁為當夢是浮生事為復浮生是夢中師答曰來時無跡去無蹤去與來時事一同何須更問浮生事祇此浮生是夢中衣衲穿弊寒暑不更經歷年歲未常下山長慶四年入滅塔於北山喜鵲寺贊曰去險就平世俗同律璇室雕宮傾危相襲至人無心險平如一謂余不信巢鵲可質唐招賢通禪師師名會通本郡人姓吳名元卿德宗朝為六宮使方春韶陽花卉盛發翫賞移時忽聞空中有言曰虗幻之相開謝不停能壞善根仁者安可視之因大感悟自是忽忽不樂帝怪而問其故以願從釋為對帝召相者視之曰此人當紹出世法遂放歸見韜光光指其謁鳥窠求度三請不從乃先創菴事既成韜光力言之鳥窠乃為祝髮服勤數年未蒙印授一日告辭鳥窠曰汝何往曰諸方學佛法去曰若是佛法吾此間亦有少許曰如何是和尚佛法鳥窠於身上拈起布毛吹之師即豁然大悟於是不復他行常居左右世號布毛侍者今招賢寺乃師道場贊曰金貂職近紫禁春濃割棄富貴瞥如輕鴻求師慕道勞苦在躬不具智勇豈悟真空唐無著喜禪師師名文喜嘉禾語兒溪人姓朱氏開成年間進具初習四分律兼講法華常往五臺山禮文殊大士夜投古寺遇老僧問南方佛法住持眾數師皆答已却問此間佛法如何住持僧曰龍蛇混雜凡聖同居又問多少眾僧曰前三三後三三師罔然喫茶畢令童子送出門俄失所在但見高林深谷而已後參仰山契悟命為典座一日見文殊跨獅子緣鼐側師訶曰文殊自文殊文喜自文喜遂掌之文殊涌空曰苦瓠連根苦甜瓜徹蔕甜修行三大劫却被老僧嫌咸通中築室千頃山居之光啟三年錢武肅王請住餘杭慈光院奏賜紫衣及無著號光化三年移住無著院是冬夜半告眾曰三界心盡即是涅槃趺坐而化時方丈發白光垂樹同色建塔靈隱之西塢贊曰未見仰山五臺遭賣既見仰山何勞緣鼐物罕為奇客頻招怪咄咄文殊草賊自敗五代白雲翊禪師師名道翊不知何許人石晉天福四年卓菴天竺山西北草衣木食高行絕塵一夕見前峯有光燭天跡其所起視之得異木焉人莫能名之者師乃取之命匠者孔仁謙刻為觀音大士像夜夢白衣人曰雕像已就明日有僧自洛陽來隨身有古佛舍利當求之已而僧果至如其夢求之得舍利三顆納於大士頂門自是靈異大著吳越時忠懿王始一新道場而奉之宋天聖中詵寂二僧又遷殿東南直乳竇峯治平二年郡守蔡公襄表其事上之曾魯公奏賜靈感觀音院額贊曰大士心光奇木斯寓眾胡不見心不應故師心佛心同體顯露現白衣身永福皇祚五代長耳相和尚師名行修號法真泉南陳氏家本豪右尚儒學師獨存心清淨不樂處俗十三出家徧參諸方得法於雪峯禪師存公師生有異相耳垂至肩上過於頂下可結頤時號長耳和尚後唐天成二年自天台國清寒巖遊錢塘吳越國王待以賓禮居南山法相院平昔常募人作福或問和尚募人作福未審有何形段師曰能遮百醜乾祐四年仲冬二日錢氏以誕辰飯僧問永明此會有聖僧否永明曰長耳和尚乃定光如來化身也既而永明預戒侍者曰長耳或來但云我寢矣師詣永明侍者依戒告之師取永明革履覆之而返翌日坐逝門人漆其全身至今存焉崇寧二年賜諡崇慧大師贊曰佛為羣生悲願叵量應身衍福為世津梁現大人相雙耳懸璫永明有語是佛定光五代永明潛禪師師名道潛河中府人姓武氏初謁清涼法眼一見異之許入室一日問曰子參請外看甚麼經師曰華嚴法眼曰總別同異成壞六相是何門攝師曰世出世間一切法皆具六相法眼曰空具六相否師不能答法眼曰子却問我師如語而問法眼曰空師言下開悟法眼曰子作麼生會師云空法眼然之後因四眾士女入寺法眼曰律中道隔壁聞釵釧聲即名破戒今覩金銀朱紫雜遝是破戒否師曰好箇入路法眼曰子向後有五百毳徒而為王侯所重在師尋辭往三衢古寺閱藏經錢忠懿王命入府受菩薩戒署慈化定慧之號周顯德元年建慧日永明寺請師居之為開山始祖眾常五百果符法眼之記永明至宋改名淨慈贊曰嶷嶷法器孕靈河嵩空華嚴相紹法眼宗名聞覇府冕玉致恭永明祖令杲日當空五代智覺壽禪師師名延壽字沖元餘杭王氏少為華亭鎮將以官錢放生坐死及市顏色不變文穆王異之放令出家居龍冊寺執勞供眾日唯一食長坐不臥得法於天台韶國師初住雪竇尋歸西湖建隆二年忠懿王請為永明第二代居十五年眾常二千署智覺號移天台所居夜施食朝放生六時散花行道日課一百八事未常暫廢餘力誦法華經計一萬三千部別號抱一子先是師於禪觀中蒙觀音大士以甘露灌口獲大辯才著宗鏡錄百二十卷以會天台賢首慈恩異同之弊詩偈幾千萬言傳播海外高麗國王致書敘弟子禮奉金線織成袈裟紫水晶數珠金澡缾為獻開寶八年示寂塔於淨慈山贊曰佛無異法取舍不同我以一鏡照彼三宗甘露所灌淵流莫窮宜爾異國翕然嚮風五代五雲逢禪師師名志逢餘杭人氏生而惡葷膚體香潔出家於臨安之東山通貫三學晉天福中參天台韶國師契悟一日入普賢殿宴坐倏有神人跪膝于前師問為誰曰護戒神也師曰吾慮宿愆未殄汝知之乎曰師有何罪唯小過耳師曰何也曰凡折鉢水亦施主物師常輒棄之非所宜也言訖而隱師自此悉飲之吳越王聞其名賜召紫衣署普覺號命住功臣山開寶初忠懿王建普門精舍請揚宗要為開山始祖四年以老固辭時大將凌超以五雲山新創華嚴道場奉施為終老之所出入𢹂大扇乞錢買肉飼虎虎每迎之載以還山雍熙二年示寂贊曰葷血之味生所弗知虎不得肉猶己饑之妥尾出林迎載而歸孰云異類感化一機宋孤山圓禪師師名智圓字無外錢塘徐氏八歲出家傳天台三觀於奉先源清師嘗歎荊溪沒後微言墜地於是留意撰述作十疏通經師蚤勤儒學兼涉老莊自號中庸子居孤山瑪瑙院有高世之節時王文穆罷相來牧郡僧悉迎於關外慈雲遣使邀師偕往師以疾辭笑謂使者曰為我致意慈雲錢塘且駐却一僧聞者歎服師少抱羸疾多杜門獨居惟與處士林逋為鄰友相好以詩文自娛雜著五十一卷題曰閑居編乾興元年二月十七日自作祭文挽辭越二日示寂門人奉遺訓斵院之後山斂以陶器合而瘞之後十五年積雨山頹啟陶覩師真身不壞爪髮俱長其脣微開齒若珂雪諡號法慧治平二年改名寶勝院紹興二十一年創延祥觀有司新師所居以廣之移額山北併塔遷焉贊曰鴻毛貴勢蟬蛻塵囂羸然一榻疊簡飛毫屹屹孤山雲林寂寥跡則剗矣弗夷其高宋慈雲式法師師名遵式字知白台州寧海葉氏母夢嚥明珠而生出家於東掖山傳天台教於寶雲通師未幾繼其席祥符八年刺史薛公請居靈山天竺寺寺久廢師按其舊而新之王文穆出守重師之道奏復天竺名尋請賜慈雲號章獻太后遣使齎白金命修懺師著金光明護國儀文上之因奏請天台教文入藏又依經撰集諸懺法盛行於世常行三昧以九十日為期師力行之感應非一凡為法祈禱必然指唯存三焉及建光明懺堂每架一椽一甃必誦大悲呪七徧屢經兵火巋然獨存願力致也師詩文典雅有金園靈苑天竺別集天聖九年歸東嶺草堂明年十月十八日夜有大星隕於山師示寂累諡法寶禪慧湻祐八年其徒明禋禱晴獲應上御宸翰加諡聖應湻祐十一年明禋禱晴復應上御宸翰加諡正覺贊曰台嶺一宗興於法智師出寶雲金昆玉季示無生忍住不退地徽號累旌終古不墜宋明教嵩禪師師名契嵩字仲靈藤州鐔津人姓李氏七歲出家既受具常戴觀音聖像誦其名號日十萬聲經傳雜書靡不博記得法於洞山聰公慶歷中至錢塘樂湖山之勝遂稅駕焉自號潛子一室翛然閉戶著書作輔教論十餘萬言明儒釋一貫又著定祖圖正宗記抱其書入京師因府尹龍圖王公素以書獻仁廟嘉歎詔付傳法院編次旌以明教之號賜其書入藏韓忠獻公歐陽文忠公皆稱道之由是名振海內已而東還屬蔡公襄為守延置佛日山居數年退老於靈隱永安精舍熙寧五年示寂闍維六根不壞者三曰眼曰舌曰童真并頂骨數珠五物存焉所出舍利紅白精潔狀如大菽葬於永安院之左門人編其書曰鐔津集贊曰閉戶著書引古連今披誠帝闕真氣森森名馳海宇道振禪林百煉不耗斯表精金宋真悟堪律師師名允堪錢塘人年九歲有客指小桂試之答曰始生巖谷畔早有月中香辨博精通撰律宗十二部經解經傳并法門贊序等文慶歷七年賜號真悟大師崇寧間加諡智圓嘉禾陳舜俞撰行業記元瘞西湖涌泉山後遷塔西湖贊曰三無漏學以戒為先至人不生宗其誰傳援筆作記弘範人天寥寥千古寶月高懸宋功臣山政禪師師名惟政字渙然華亭黃氏幼有卓識十八具戒即遊方問道凡三十年罷參居功臣山淨土院出入常跨一黃牛慶歷中侍郎蔣公堂與師契密嘗贈詩云禪客尋常入舊都黃牛角上挂瓶盂有時帶笠穿雲去便好和雲作畫圖蓋實錄也或問師何不談禪曰徒費言語吾懶寧暇曲折但日夜煩萬象敷演耳性簡率冬不附爐惟以荻花作毬納足其中客至共之特好翫月每盤膝坐大盆浮池中自施轉之吟嘯達旦率以為常詩峭思致甚高一日蔣公曰明日府中讌客別設素饌延師願同清話師諾之明日留一偈而去偈曰昨日曾將今日期出門倚杖又思惟為僧只合居巖谷國士筵中甚不宜又山中偈曰橋上山萬重橋下水千里惟有白鷺鷥見我常來此又送僧偈曰山中何所有嶺上多白雲只可自怡悅不堪持贈君常自贊其像曰貌古形疏倚杖藜分明畫出須菩提解空不許離聲色似聽孤猿月下啼人皆傳誦焉筆法有晉人風秦少游尤所愛玩凡見其筆跡必取蓄之世稱為政黃牛贊曰高韻超俗清吟絕塵一笠牛背林間水濵貌癯趣淡莫得而親何以自怡嶺有白雲宋海月辨法師師名慧辨字訥翁華亭富氏子受業普照從天竺韶及浮石矩傳天台教觀韶將老命師代講夢章安以金篦擊其口曰汝勤於誨人當得辨智久之率繼其席嘉祐中翰林沈公遘帥郡以嚴為理察師道行獨異之俾涖僧職遷都僧正東坡時為通守嘗與師為方外之游講授二十五年往來常千人無何歸隱草堂但六事隨身而已熈寧六年冬旦起盥濯別眾而化遺戒須待東坡至方可合棺四日坡始抵山中見其趺坐如生頂尚溫煖作三絕哭之師沒二十一年東坡追序其事云余去杭夢至西湖上有大殿榜曰彌勒下生故人海月辨師之流皆行道其間乃作贊辭潁濵銘其塔贊曰滄海孤月生於雲間飛輪竺嶺萬象光寒知之者誰眉山老仙有如不信銘贊皎然宋辨才淨法師師名元淨字無象於潛徐氏生而左肩肉起如袈裟條八十一日乃滅父歎曰是宿世沙門也自幼出家受業於慈雲日夜精勤慈雲沒後復事明智年二十五賜紫衣及辨才號太守沈公遘謂上天竺觀音道場以音聲懺悔為佛事非禪那居請師以教易之師至吳越競來鑿山增室幾至萬礎學者數倍十七年有利而奪之者逾年奪者敗復以𢌿師趙清獻公贊之云師去天竺山空鬼哭天竺師歸道場光輝越二年謝去老於南山龍井之上平生精修淨業行成力具著應非一甞與僧熈仲同食仲視師眉間有光如螢攬之得舍利後常有於臥起處得舍利者元祐八年示寂壽八十一果符初生肩痕之徵塔成東坡誌其行事潁濵為銘贊曰法苑將興棟梁攸屬揮麈白雲雨花飄馥維趙及蘇式是高躅龍井風清過者必肅宋南屏臻法師師名道臻傳四明法智之道初住金山龍遊侍讀吳公倅都聞師名革興教禪居請主之學者朋來師每講次會文集義貫穿始終浙西台學大振自南屏始嘗述二偈贊妙宗鈔曰佛許六即辨蛣蜣何不通知一不知二失西又失東三十若果成一切皆常樂蛣蜣不究竟諸佛斷性惡後與淨覺嶽公辨教門陳詞有司乞築高臺豎赤旛倣西竺聖師與外道角勝以旛標顯處義墮者斷首截舌懸之府尹杜而不從聞者凜然初吳公多於休沐請講盛服止閫外師未登座不輒入東坡云與師語羣集有所遺忘師則應口誦之衮衮不休東坡祭辨才文云講有辨臻即謂師也崇寧中諡實相贊曰維南有山天設翠屏師講其下鬼神來聽法戰之勇氣肅千兵坡言不泯尚為典刑宋大智照律師師名元照字湛然餘杭唐氏少依祥符東藏慧鑑師學毗尼及見神悟謙公講天台教觀遂摳衣出門博究羣宗以律為本又從廣慈受菩薩戒戒光發見頓漸律儀罔不兼備南山一宗蔚然大振常披布伽黎杖錫持鉢乞食於市楊無為贊之曰持鉢出持鉢歸佛心常在四威儀初入時人不識虗空常有鬼神知四主郡席晚居靈芝凡三十年眾常數百嘗言化當世莫若講說垂將來莫若著書撰資持濟緣行宗應法住法報恩諸記十六觀小彌陀義疏及刪定律尼本共百餘卷芝園集二十卷自號安忍子政和六年秋命諷普賢行願品趺坐而化漁人皆聞天樂聲建塔靈芝西北諡大智贊曰毗尼祕藏終南著稱中微孰振大智崛興儀合萬行論集諸乘芝園西邁天樂來迎宋三藏道法師師名法道舊名永道順昌毛氏出家宗唯識百法二論又受要天總持三藏密呪軌及傳圓頓戒法於圓照師咸得其要政和中賜椹衣主左街香積院賜號寶覺林靈素以左道罔上宣和初詔改僧為德士服冠巾天下從之無敢後師獨毅然抗詔黥流道州後七年還僧建炎三年賜圓通法濟號紹興間賜對上面命欲為之去其涅跡師曰雖感聖恩然先皇之墨不忍除也上曰這僧到老倔強計自便故事道場僧左道右崇觀以來遂易舊制師不能平詣朝廷與道士劉若謙論辨卒獲改正十七年秋說偈端坐而化茶毗舍利無數建塔九里松贊曰維古至人為法亡身身既亡矣涅奚足云蠻鄉瘴重黼座恩新等視無礙太虗浮雲宋北關妙行淨律師師名思淨錢塘喻氏子好畫阿彌陀佛臻其妙楊無為呼為喻彌陀世因以稱焉棄家學佛就北關僦舍飯僧不二十年及三百萬移妙行額廣所居為寺至今接待不絕屬離亂寺獨不焚師造賊壘願以一身代一城之命賊竦然為之少戢或者問師能畫彌陀何不參禪師答曰平生只解念彌陀不解參禪可奈何但得五湖風月在太平何用動干戈師兒時遊西湖多寶山輒作念曰異時當鐫此石為佛後果為彌勒像侍郎薛公問彌勒見在天宮說法鑿石奚為師答曰咄哉頑石頭全憑巧匠修只今彌勒佛莫待下生求其隨機應答類如此師平生務實不事虗飾紹興七年冬趺坐而逝侍郎無垢張公九成銘其塔贊曰永脫世塵不為物轉本有彌陀毫端發見鉢飯流香石像符願無垢為銘師其可見宋僧統寧法師師名贊寧姓高氏其先世渤海人天祐中師生於吳興郡之德清金鵝別墅出家杭之祥符習南山律宗著述毗尼時人謂之律虎文學日茂聲望日隆武肅諸王公族咸慕重之署為兩浙僧統賜號明義宗文興國三年太宗聞其名詔對滋福殿延問彌日改賜通慧詔修大宋高僧傳三十卷又詔撰三教聖賢事一百卷初補左街講經首座知西京教門事咸平初加右街僧錄師又著內典集一百五十卷外學集四十九卷內翰王禹偁作文集序極其贊美及有書稱其文辭末云所謂時雨降矣日月出矣灌溉爝火復何為哉至道二年示寂葬龍井塢崇寧四年加諡圓明贊曰學富道充名聞國綸巾屢膺爰寵其職史館譯場削浮纂實曰古曰今光明罔極宋晉水源法師師名淨源字伯常姓楊氏生而敏慧依東京報慈寺海達大師得度奮志參尋初見華嚴承遷次見橫海明覃後見長水子盡得華嚴奧旨聲譽籍甚住泉之清涼蘇之觀音杭之祥符湖之寶閣秀之善住左丞蒲公守杭尊其道以慧因院易禪為教命師居之所至緇素景慕師筆力遒勁合華嚴證聖正元二疏為一以便觀覽製華嚴楞嚴圓覺三懺法及作法華集義通要十四卷又疏解仁王般若等經高麗國王子為僧曰統義天航海而來問法於師朝廷遣侍講楊傑館伴化及外國其道可知矣元祐三年冬示寂茶毗得舍利無數瘞於慧因院之西北壽七十八先世泉之晉水人故學者以晉水稱之贊曰法界無盡一心洞明奮厥餘力詮釋羣經作式垂範聿有駿聲慕法者眾海國揚舲

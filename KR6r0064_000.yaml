body:
  text: 武林西湖高僧事略序人生五濁惡世根塵濡染昏迷沈著其能出離火宅者蓋寡至於翦髮披緇而為僧固已高於衆人矣然僧之為僧豈若是而止哉識心見性超出死生精持戒律真積力久詮演教法垂範將來百千萬僧中間見一二表表偉偉卓乎不可企及舉世佛徒莫不宗仰之此高僧所以有傳也作者有人讀者有人修之者又有人然未有思其人追其蹤想像其高致即其曩昔經行宴坐之地崇飾傑閣而嚴奉之紀述行業而偈贊之圖繪頂相而瞻敬之者瑪瑙講師元敬節菴乃克為之也閣始創於前主僧了性工未就而遷住他剎節菴實踵成之始會萃名宿嘗駐錫於錢塘者得二十有四人命東嘉僧元復撫其事實而繫之贊續訪求又得六人焉節菴併述而贊之圖其形置之閣又慮不能流布四方乃合而成書名以西湖高僧事略鋟梓以惠學者噫佛法盛於東南異人輩出前人既為後人所高矣燈燈相傳續佛慧命將使後人而復高後人深有望焉寶祐丙辰長至日吳郡莫子文序武林西湖高僧事略目録晉三藏理法師齊玉泉超法師隋下竺觀法師中竺千歲和尚唐徑山欽禪師唐虎跑中禪師唐下竺標禪師唐圓澤和尚唐韜光禪師唐鳥窠林禪師唐招賢通禪師唐無著喜禪師五代白雲翊禪師五代長耳相和尚五代永明潛禪師五代智覺壽禪師五代五雲逢禪師宋孤山圓法師宋慈雲式法師宋明教嵩禪師宋真悟堪律師宋功臣山政禪師宋海月辨法師宋辨才淨法師宋南屏臻法師宋大智照律師宋三藏道法師宋妙行淨律師宋僧統寧法師宋晉水源法師
